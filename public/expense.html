<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValeBook - Gider Girişi</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">
                <h1>ValeBook</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="icon-dashboard"></i> Dashboard</a></li>
                <li><a href="income.html"><i class="icon-income"></i> Gelir Girişi</a></li>
                <li><a href="expense.html" class="active"><i class="icon-expense"></i> Gider Girişi</a></li>
                <li><a href="reports.html"><i class="icon-reports"></i> Raporlar</a></li>
                <li><a href="pos-management.html"><i class="icon-pos"></i> POS Yönetimi</a></li>
                <li><a href="settings.html"><i class="icon-settings"></i> Ayarlar</a></li>
            </ul>
        </nav>

        <main class="content">
            <header class="top-bar">
                <div class="breadcrumb">Girişler / Gider Kaydı</div>
                <div class="date-display" id="currentDate">-- -- ----</div>
            </header>

            <section class="entry-form">
                <div class="card">
                    <h2>Yeni Gider Ekle</h2>
                    <form id="expenseForm">
                        <input type="hidden" id="editingId">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="date">Tarih</label>
                                <input type="date" id="date" required>
                            </div>
                            <div class="form-group">
                                <label for="category">Kategori</label>
                                <select id="category" required>
                                    <!-- JS ile doldurulacak -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="amount">Tutar (₺)</label>
                                <input type="number" id="amount" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="paymentMethod">Ödeme Yöntemi</label>
                                <select id="paymentMethod">
                                    <option value="cash">Nakit</option>
                                    <option value="bank_transfer">Banka Havalesi (EFT)</option>
                                    <option value="credit_card">Kredi Kartı</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="documentNo">Belge/Fatura No</label>
                                <input type="text" id="documentNo">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="description">Açıklama</label>
                            <input type="text" id="description" required>
                        </div>
                        <div class="form-group">
                            <label for="note">Not</label>
                            <textarea id="note" rows="2"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Kaydet</button>
                            <button type="button" id="btnUndo" class="btn btn-secondary" title="Son işlemi geri al">⬅️ Geri</button>
                            <button type="button" id="btnRedo" class="btn btn-secondary" title="Son geri alınanı geri yükle">İleri ➡️</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="list-section">
                <h2>Gider Geçmişi</h2>
                <div class="table-container">
                    <table id="expenseTable">
                        <thead>
                            <tr>
                                <th>Tarih</th>
                                <th>Kategori</th>
                                <th>Açıklama</th>
                                <th>Tutar</th>
                                <th>İşlem</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer class="footer">
            <span id="versionDisplay">ValeBook v1.0.0</span>
        </footer>
    </div>

    <script src="js/app.js"></script>
    <script src="js/expense.js"></script>
</body>
</html>
