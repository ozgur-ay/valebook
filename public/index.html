<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValeBook - Kasa Yönetimi</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Yan Menü -->
        <nav class="sidebar">
            <div class="logo">
                <h1>ValeBook</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active"><i class="icon-dashboard"></i> Dashboard</a></li>
                <li><a href="income.html"><i class="icon-income"></i> Gelir Girişi</a></li>
                <li><a href="expense.html"><i class="icon-expense"></i> Gider Girişi</a></li>
                <li><a href="reports.html"><i class="icon-reports"></i> Raporlar</a></li>
                <li><a href="settings.html"><i class="icon-settings"></i> Ayarlar</a></li>
            </ul>
        </nav>

        <!-- Ana İçerik -->
        <main class="content">
            <header class="top-bar">
                <div class="breadcrumb">Dashboard / Genel Bakış</div>
                <div class="date-display" id="currentDate">-- -- ----</div>
            </header>

            <section class="dashboard-overview">
                <!-- Özet Kartları -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Bugünkü Araç</h3>
                        <p class="value" id="todayVehicleCount">0</p>
                    </div>
                    <div class="stat-card highlight">
                        <h3>Net Kâr (Bu Ay)</h3>
                        <p class="value" id="monthNetProfit">0.00 ₺</p>
                    </div>
                    <div class="stat-card">
                        <h3>Toplam Gelir</h3>
                        <p class="value" id="todayTotalIncome">0.00 ₺</p>
                    </div>
                    <div class="stat-card">
                        <h3>Toplam Gider</h3>
                        <p class="value" id="todayTotalExpense">0.00 ₺</p>
                    </div>
                </div>

                <!-- Son İşlemler -->
                <div class="recent-activity">
                    <h2>Son İşlemler</h2>
                    <h2>Son İşlemler</h2>
                    <div class="table-container">
                        <table id="recentTransactionsTable">
                            <thead>
                                <tr>
                                    <th>Tarih</th>
                                    <th>Tip</th>
                                    <th>Kategori/Açıklama</th>
                                    <th>Tutar</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JS ile doldurulacak -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <!-- Versiyon Bilgisi -->
        <footer class="footer">
            <span id="versionDisplay">ValeBook v1.0.0</span>
        </footer>
    </div>

    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
